trigger:
- main

parameters:
- name: SignType
  displayName: Signature
  type: string
  default: test
  values:
  - real
  - test
- name: IsPublishing
  displayName: Publish the build
  type: boolean
  default: false  

variables:
  BuildSolution: 'external/VSTUAnalyzers/src/Microsoft.Unity.Analyzers.sln'
  BuildConfiguration: 'Release'
  OutputPath: 'bin/$(BuildConfiguration)'
  BinLog: '$(OutputPath)/build.binlog'
  MSBuildArguments: '/restore /p:Features="pdb-path-determinism" /bl:$(BinLog)'
  TeamName: 'VSTU'

resources:
  repositories:
  - repository: MicroBuildTemplate
    type: git
    name: 1ESPipelineTemplates/MicroBuildTemplate
    ref: refs/tags/release

extends:
  template: azure-pipelines/MicroBuild.1ES.Official.yml@MicroBuildTemplate
  parameters:
    pool:
      name: VSEngSS-MicroBuild2022-1ES
      demands:
      - msbuild
      os: windows

    stages:
    - stage: BuildAndPublish
      jobs:
      - job: VSTUAnalyzers
        timeoutInMinutes: 120

        templateContext:
          mb:
            signing:
              enabled: true
              signType: '${{ parameters.SignType }}'
              zipSources: false
          outputs:
          - output: pipelineArtifact
            displayName: 'Artifact: Install'
            targetPath: '$(Build.ArtifactStagingDirectory)\install'
            artifactName: Install

        steps:
        - checkout: self
          submodules: true

        - task: NuGetAuthenticate@1
          displayName: 'Authenticate NuGet feeds'
          
        - task: PowerShell@1
          displayName: 'Build infos'
          inputs:
            scriptName: tools/buildinfos.ps1

        - task: UseDotNet@2
          displayName: 'Use .NET Core sdk 8.0.x'
          inputs:
            version: 8.0.x

        - task: MSBuild@1
          displayName: 'Build solution'
          inputs:
            solution: '$(BuildSolution)'
            configuration: '$(BuildConfiguration)'
            msbuildArguments: '$(MSBuildArguments)'
            clean: true

        - task: MSBuild@1
          displayName: 'Pack solution'
          inputs:
            solution: '$(BuildSolution)'
            configuration: '$(BuildConfiguration)'
            msbuildArguments: '/t:Pack'

        - task: CopyFiles@2
          displayName: 'Collect Install'
          inputs:
            SourceFolder: '$(OutputPath)'
            Contents: |
              **\*.nupkg
              **\*.snupkg
            TargetFolder: '$(Build.ArtifactStagingDirectory)\install'

        - task: PowerShell@2
          displayName: Version check
          condition: and(succeeded(), and(eq('${{ parameters.SignType }}', 'real'), eq(${{ parameters.IsPublishing }}, true)))
          inputs:
            targetType: inline
            script: |
              $version = "$(Build.SourceBranchName)"
              Write-Output "Checking release version ${version}"
              $regex = "\d+\.\d+\.\d+\.\d+"
              if ($version -notmatch $regex) { 
                Write-Error "You should only publish a build using a version tag !"
                exit 1
              }

        - task: NuGetToolInstaller@1
          displayName: 'Use NuGet'
          condition: and(succeeded(), and(eq('${{ parameters.SignType }}', 'real'), eq(${{ parameters.IsPublishing }}, true)))

        - task: 1ES.PublishNuGet@1
          displayName: 'NuGet push'
          condition: and(succeeded(), and(eq('${{ parameters.SignType }}', 'real'), eq(${{ parameters.IsPublishing }}, true)))
          inputs:
            packageParentPath: '$(Build.ArtifactStagingDirectory)'
            packagesToPush: '$(Build.ArtifactStagingDirectory)\install\*.nupkg'
            nuGetFeedType: external
            externalEndpoint: VisualStudioToolsForUnity (nuget.org)
