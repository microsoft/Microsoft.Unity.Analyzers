trigger:
- main

pool:
  name: VSEngSS-MicroBuild2022-1ES
  demands:
  - DotNetFramework
  - msbuild

variables:
  BuildSolution: 'external/VSTUAnalyzers/src/Microsoft.Unity.Analyzers.sln'
  BuildConfiguration: 'Release'
  OutputPath: 'bin/$(BuildConfiguration)'
  BinLog: '$(OutputPath)/build.binlog'
  MSBuildArguments: '/restore /p:Features="pdb-path-determinism" /bl:$(BinLog)'
  TeamName: 'VSTU'
  Codeql.Enabled: true

steps:
- checkout: self
  submodules: true

- task: MicroBuildSigningPlugin@2
  displayName: 'Install Signing Plugin'
  inputs:
    signType: '$(SignType)'

- task: NuGetAuthenticate@0

- task: PowerShell@1
  displayName: 'Build infos'
  inputs:
    scriptName: tools/buildinfos.ps1

- task: CredScan@3
  displayName: 'Run CredScan'
  inputs:
    toolMajorVersion: V2
    debugMode: false

- task: PoliCheck@2
  displayName: 'Run PoliCheck'
  inputs:
    targetType: F

- task: UseDotNet@2
  displayName: 'Use .NET Core sdk 7.0.x'
  inputs:
    version: 7.0.x

- task: MSBuild@1
  displayName: 'Build solution'
  inputs:
    solution: '$(BuildSolution)'
    configuration: '$(BuildConfiguration)'
    msbuildArguments: '$(MSBuildArguments)'
    clean: true

- task: RoslynAnalyzers@3
  displayName: 'Run RoslynAnalyzers'
  inputs:
    userProvideBuildInfo: 'auto'
    rulesetName: 'Required'
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  condition: and(succeeded(), eq(variables['SignType'], 'Test'))

- task: MSBuild@1
  displayName: 'Pack solution'
  inputs:
    solution: '$(BuildSolution)'
    configuration: '$(BuildConfiguration)'
    msbuildArguments: '/t:Pack'

- task: PostAnalysis@2
  displayName: 'Post Analysis'
  inputs:
    GdnBreakAllTools: true
    #GdnBreakSuppressionFiles: '$(Build.SourcesDirectory)\build\pipelines\suppressions.gdnsuppress'
    GdnBreakOutputSuppressionFile: 'output-suppressions'

- task: PublishSecurityAnalysisLogs@3
  displayName: 'Publish Security Analysis Logs'
  condition: succeededOrFailed()

- task: ComponentGovernanceComponentDetection@0
  displayName: 'Component Detection'

- task: CopyFiles@2
  displayName: 'Collect Install'
  inputs:
    SourceFolder: '$(OutputPath)'
    Contents: |
     **\*.nupkg
     **\*.snupkg
    TargetFolder: '$(Build.ArtifactStagingDirectory)\install'

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: Drop'
  inputs:
    PathtoPublish: '$(OutputPath)'
    ArtifactName: Drop

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: Install'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)\install'
    ArtifactName: Install

- powershell: |
   $regex = "\d+\.\d+(\.\d+\.\d+)?"
   $version="$(Build.SourceBranchName)"
   if ($version -match $regex) { 
     Write-Host "##vso[build.addbuildtag]Built from tag"
   }
  displayName: 'Tag Build (when building from tag)'

- task: MicroBuildCleanup@1
  displayName: 'Perform Cleanup Tasks'
  condition: succeededOrFailed()
